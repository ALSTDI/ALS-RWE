site_name: ALS TDI Real World Evidence Resources
site_url: https://alstdi.github.io/ALS-RWE

theme:
  name: material
  logo: assets/ALSTDI-logo-stacked-color.png
  font:
    text: "EB Garamond"
  palette:
    scheme: default
    primary: custom         # uses CSS variables for the purple
    accent: custom
  icon:
    repo: fontawesome/brands/github
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - navigation.header
    - navigation.sections
    - navigation.indexes
    - navigation.path
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link
  # no repo_url and no content.action.view/edit to avoid top-right clutter

nav:
  - Home: index.md
  - New to RWE? Start Here: free-rwe-resources.md
  - ALS TDI OMOP Data Set: als-tdi-omop-data-set.md
  - STARDUSTT Approach: stardustt-approach.md
  - Train-the-Trainer (OHDSI/OMOP):
      - Overview: free-rwe-resources/train-the-trainer/index.md
      - Syllabus: free-rwe-resources/train-the-trainer/syllabus.md
      - Personas & Learning Paths: free-rwe-resources/train-the-trainer/personas.md
      - "⭐ Feasibility First (MCH exemplar)":
          - Overview: free-rwe-resources/train-the-trainer/feasibility-first/index.md
          - "1 · Sharpen the Question": free-rwe-resources/train-the-trainer/feasibility-first/01-sharpen-the-question.md
          - "2 · Find Your Data Steward": free-rwe-resources/train-the-trainer/feasibility-first/02-find-your-data-steward.md
          - "3 · Vocabulary & CDM Primer": free-rwe-resources/train-the-trainer/feasibility-first/03-vocab-and-cdm-primer.md
          - "4 · ATLAS Feasibility Walkthrough": free-rwe-resources/train-the-trainer/feasibility-first/04-atlas-feasibility-walkthrough.md
          - "5 · Network Feasibility": free-rwe-resources/train-the-trainer/feasibility-first/05-network-feasibility.md
          - "6 · Feasibility Checklist": free-rwe-resources/train-the-trainer/feasibility-first/06-feasibility-checklist.md
          - "Facilitator Notes": free-rwe-resources/train-the-trainer/feasibility-first/07-facilitator-notes.md
          - "Appendix · Checks to Tools": free-rwe-resources/train-the-trainer/feasibility-first/08-checks-to-tools.md
      - Modules:
          - "Module 0 · Environment Setup": free-rwe-resources/train-the-trainer/modules/00-environment-walkthrough.md
          - "Day 1 · OMOP Common Data Model": free-rwe-resources/train-the-trainer/modules/day-01-omop-cdm.md
          - "Day 2 · Vocabulary & Data Quality": free-rwe-resources/train-the-trainer/modules/day-02-vocab-dqd.md
          - "Day 3 · Cohort Definition": free-rwe-resources/train-the-trainer/modules/day-03-cohorts.md
          - "Day 4 · Data Extraction": free-rwe-resources/train-the-trainer/modules/day-04-extraction.md
          - "Day 5 · Treatment Pathways (Optional)": free-rwe-resources/train-the-trainer/modules/day-05-pathways.md
          - "Day 6 · HADES (Optional)": free-rwe-resources/train-the-trainer/modules/day-06-hades.md
      - Exercises:
          - "Day 1 · Athena & CDM Vocabulary": free-rwe-resources/train-the-trainer/exercises/day-01-athena-cdm.md
          - "Day 1 · SQL Code Snippets": free-rwe-resources/train-the-trainer/exercises/code_snippets/day-01-snippets.md
          - "Day 2 · Concept Sets in Atlas": free-rwe-resources/train-the-trainer/exercises/day-02-vocab-dqd.md
          - "Day 3 · Cohorts in ATLAS": free-rwe-resources/train-the-trainer/exercises/day-03-cohorts.md
          - "Day 4 · Data Extraction": free-rwe-resources/train-the-trainer/exercises/day-04-extraction.md
          - "Day 5 · Treatment Pathways (Optional)": free-rwe-resources/train-the-trainer/exercises/day-05-pathways-optional.md
          - "Day 6 · HADES (Optional)": free-rwe-resources/train-the-trainer/exercises/day-06-hades-optional.md
      - Common Artifacts:
          - "Environment Setup Handout": free-rwe-resources/train-the-trainer/common_artifacts/environment-setup-handout.md
          - "OMOP Vocabulary & SQL Cheat Sheet": free-rwe-resources/train-the-trainer/common_artifacts/omop-vocab-sql-cheat-sheet.md
          - "SQL Validation Mini Lab": free-rwe-resources/train-the-trainer/common_artifacts/sql-validation-mini-lab.md
          - "Environment Checklist Template": free-rwe-resources/train-the-trainer/common_artifacts/environment-checklist-template.md
      - Community:
          - "Weekly Community Meeting": free-rwe-resources/train-the-trainer/community/weekly-meeting.md
          - "Office Hours": free-rwe-resources/train-the-trainer/community/office-hours.md
          - "FAQ": free-rwe-resources/train-the-trainer/community/faq.md
      - Downloads & Resources: free-rwe-resources/train-the-trainer/resources.md
      - Acknowledgements: free-rwe-resources/train-the-trainer/acknowledgements.md
  - Select Publications: select-publications.md
  - GA4GH Connect 2026: ga4gh.md


markdown_extensions:
  - meta
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: false
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

plugins:
  - search

extra:
  generator: false

extra_css:
  - assets/css/custom.css

watch:
  - docs/assets
  - docs/assets/css

extra_javascript:
  - assets/js/ga4gh-datadictionary.js
